<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./CSS/style.css">
</head>

<body class="bg-light">

    <header class="bg-primary fs-1 text-white p-3 ">ClasseWeb</header>

    <div class="container py-4">
        <h1 class="text-center mb-4"> 📒 Sistema Escolar 🏫</h1>

        <div class="row d-flex justify-content-center">

            <!-- SALAS -->
            <div class="col-md-4">
                <div class="card shadow-sm p-3">
                    <h5>Criar Sala</h5>

                    <input type="text" id="nomeSala" class="form-control mb-2" placeholder="Nome da sala">
                    <select class="form-select invisible mb-2"></select>
                    <button class="btn btn-primary w-100" onclick="criarSala()"> Criar </button>
                </div>
            </div>

            <!-- ALUNOS -->
            <div class="col-md-4">
                <div class="card shadow-sm p-3 mb-3">
                    <h5>Cadastrar Alunos</h5>
                    <input type="text" id="nomeAluno" class="form-control mb-2" placeholder="Nome do Aluno">
                    <select class="form-select mb-2" id="selectSala">
                        <option value="" selected disabled>Selecione uma sala</option>
                    </select>
                    <button class="btn btn-success w-100" onclick="cadastrarAluno()"> Cadastrar </button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm p-3 mb-3">
                    <h5>Chamada</h5>
                    <input type="date" id="dataChamada" class="form-control mb-2">
                    <select class="form-select mb-2" id="filtroSala">
                        <option value="" selected disabled>Selecione uma sala</option>
                    </select>
                    <button class="btn btn-dark w-100" onclick="carregarChamada()">Carregar</button>
                </div>
            </div>
            <!-- FIM ALUNOS -->
        </div>

            <!-- LISTA -->
            <div class="card shadow-sm p-3 mb-3">
                <h5>Lista de Alunos</h5>
                <ul id="listaAlunos" class="list-group"></ul>
            </div>

            <!-- CHAMADA -->
            <div class="card shadow-sm p-3">
                <h5>Registro de Presença</h5>
                <div id="chamada"></div>
            </div>
    </div>

    <footer class="footer mt-auto p-4 bg-primary text-white fw-bold text-center">©2026 Enzo Barbino. Todos os direitos reservados.</footer>


    <!-- Script do Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./JS/app.js"></script>
</body>

</html>
